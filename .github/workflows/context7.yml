name: Context7
on:
  workflow_dispatch:
  workflow_call:

jobs:
  refresh:
    name: Refresh
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Context7 Refresh
        run: |
          curl -sS -f -X POST https://context7.com/api/v1/refresh \
            -H "Authorization: Bearer ${{ secrets.CONTEXT7_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"libraryName": "/yasanglass/kepko"}'
