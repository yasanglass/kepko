name: JVM

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Assemble
        run: ./gradlew jvmJar

      - name: Test
        run: ./gradlew jvmTest

      - name: Generate Coverage Report
        if: ${{ !cancelled() }}
        run: ./gradlew koverXmlReport

      - name: Upload Coverage to Codecov (Token)
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: build/reports/kover/report.xml
          fail_ci_if_error: true

      - name: Upload Coverage to Codecov (OIDC)
        if: ${{ !cancelled() && env.CODECOV_TOKEN == '' }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: build/reports/kover/report.xml
          fail_ci_if_error: true

      - name: Upload Test Results to Codecov (Token)
        if: ${{ !cancelled() && env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          report_type: test_results
          files: "**/build/test-results/jvmTest/TEST-*.xml"

      - name: Upload Test Results to Codecov (OIDC)
        if: ${{ !cancelled() && env.CODECOV_TOKEN == '' }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          report_type: test_results
          files: "**/build/test-results/jvmTest/TEST-*.xml"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: |
            **/build/libs/*-jvm.jar
          retention-days: 30
