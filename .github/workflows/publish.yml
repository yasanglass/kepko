name: Publish
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: macOS-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Publish to MavenCentral
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

      - name: Upload Library Artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          uploaded_any=false
          for module in resource foundation component persistence; do
            zip_name="kepko-${module}-${TAG}.zip"
            files=()
            while IFS= read -r -d '' file; do
              files+=("${file}")
            done < <(
              find "${module}/build/libs" "${module}/build/outputs/aar" \
                -type f \
                \( -name '*.jar' -o -name '*.aar' -o -name '*.module' -o -name '*.pom' -o -name '*.klib' \) \
                -print0 2>/dev/null
            )

            if [ "${#files[@]}" -eq 0 ]; then
              echo "::notice::No artifacts found for ${module}; skipping release upload."
              continue
            fi

            rm -f "${zip_name}"
            zip -j "${zip_name}" "${files[@]}"
            gh release upload "${TAG}" "${zip_name}" --clobber
            uploaded_any=true
          done

          if [ "${uploaded_any}" = false ]; then
            echo "::warning::No release artifacts were uploaded. Maven Central publish may still have succeeded."
          fi

  sample-macos:
    name: Sample App (macOS)
    needs: publish
    runs-on: macOS-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Build macOS Targets
        run: |
          ./gradlew \
            :sample:composeApp:packageDmg \
            :sample:composeApp:packagePkg \
            :sample:composeApp:linkReleaseExecutableMacosArm64 \
            :sample:composeApp:linkReleaseExecutableMacosX64

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          cp sample/composeApp/build/compose/binaries/main/dmg/*.dmg "kepko-sample-macos-${TAG}.dmg"
          gh release upload "${TAG}" "kepko-sample-macos-${TAG}.dmg" --clobber

          cp sample/composeApp/build/compose/binaries/main/pkg/*.pkg "kepko-sample-macos-${TAG}.pkg"
          gh release upload "${TAG}" "kepko-sample-macos-${TAG}.pkg" --clobber

          cd sample/composeApp/build/bin/macosArm64/releaseExecutable
          zip -r "${GITHUB_WORKSPACE}/kepko-sample-macos-arm64-${TAG}.zip" .
          cd "${GITHUB_WORKSPACE}"
          gh release upload "${TAG}" "kepko-sample-macos-arm64-${TAG}.zip" --clobber

          cd sample/composeApp/build/bin/macosX64/releaseExecutable
          zip -r "${GITHUB_WORKSPACE}/kepko-sample-macos-x64-${TAG}.zip" .
          cd "${GITHUB_WORKSPACE}"
          gh release upload "${TAG}" "kepko-sample-macos-x64-${TAG}.zip" --clobber

  sample-linux:
    name: Sample App (Linux)
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Install RPM
        run: sudo apt-get install -y rpm

      - name: Build Linux Targets
        run: |
          ./gradlew \
            :sample:composeApp:packageDeb \
            :sample:composeApp:packageRpm \
            :sample:androidApp:assembleRelease \
            :sample:composeApp:wasmJsBrowserDistribution \
            :sample:composeApp:jsBrowserDistribution

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          cp sample/composeApp/build/compose/binaries/main/deb/*.deb "kepko-sample-linux-${TAG}.deb"
          gh release upload "${TAG}" "kepko-sample-linux-${TAG}.deb" --clobber

          cp sample/composeApp/build/compose/binaries/main/rpm/*.rpm "kepko-sample-linux-${TAG}.rpm"
          gh release upload "${TAG}" "kepko-sample-linux-${TAG}.rpm" --clobber

          for apk in sample/androidApp/build/outputs/apk/release/*.apk; do
            suffix="$(basename "${apk}" .apk)"
            suffix="${suffix#androidApp}"
            cp "${apk}" "kepko-sample-android${suffix}-${TAG}.apk"
            gh release upload "${TAG}" "kepko-sample-android${suffix}-${TAG}.apk" --clobber
          done

          cd sample/composeApp/build/dist/wasmJs/productionExecutable
          zip -r "${GITHUB_WORKSPACE}/kepko-sample-wasm-${TAG}.zip" .
          cd "${GITHUB_WORKSPACE}"
          gh release upload "${TAG}" "kepko-sample-wasm-${TAG}.zip" --clobber

          cd sample/composeApp/build/dist/js/productionExecutable
          zip -r "${GITHUB_WORKSPACE}/kepko-sample-js-${TAG}.zip" .
          cd "${GITHUB_WORKSPACE}"
          gh release upload "${TAG}" "kepko-sample-js-${TAG}.zip" --clobber

  sample-windows:
    name: Sample App (Windows)
    needs: publish
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Build Windows Targets
        shell: bash
        run: ./gradlew :sample:composeApp:packageMsi :sample:composeApp:packageExe

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          cp sample/composeApp/build/compose/binaries/main/msi/*.msi "kepko-sample-windows-${TAG}.msi"
          gh release upload "${TAG}" "kepko-sample-windows-${TAG}.msi" --clobber

          cp sample/composeApp/build/compose/binaries/main/exe/*.exe "kepko-sample-windows-${TAG}.exe"
          gh release upload "${TAG}" "kepko-sample-windows-${TAG}.exe" --clobber
